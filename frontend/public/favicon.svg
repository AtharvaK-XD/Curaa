<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="curaaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Container -->
  <rect width="512" height="512" rx="128" fill="url(#curaaGradient)" />
  
  <!-- Modern Stylized Curaa 'C' + Medical Cross Icon -->
  <g fill="#050508">
    <!-- Stylized C Arc -->
    <path d="M 360 148 C 300 90 200 90 140 150 C 70 220 70 310 140 375 C 200 430 300 430 360 372 C 375 357 353 335 338 350 C 290 395 210 395 162 347 C 110 295 110 220 162 168 C 210 120 290 120 338 165 C 353 180 375 158 360 148 Z" />
    
    <!-- Medical Cross -->
    <rect x="236" y="166" width="40" height="180" rx="14" />
    <rect x="166" y="236" width="180" height="40" rx="14" />
  </g>
</svg>